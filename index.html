<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Embarque</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .shipment-title {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .part-number {
            font-size: 1.5em;
            color: #764ba2;
            font-weight: 600;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .info-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .info-label {
            font-size: 0.85em;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1.2em;
            color: #333;
            font-weight: bold;
        }

        .photos-section {
            margin-top: 30px;
        }

        .photos-title {
            font-size: 1.5em;
            color: #667eea;
            margin-bottom: 20px;
            text-align: center;
        }

        .photos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .photo-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }

        .photo-label {
            font-size: 1.1em;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .photo-img {
            width: 100%;
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.3s;
        }

        .photo-img:hover {
            transform: scale(1.05);
        }

        .photo-placeholder {
            color: #999;
            font-style: italic;
            padding: 40px 20px;
            background: #e9ecef;
            border-radius: 10px;
        }

        .error {
            background: white;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            color: #dc3545;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
        }

        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 90%;
            margin-top: 2%;
        }

        .close {
            position: absolute;
            top: 30px;
            right: 45px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .shipment-title {
                font-size: 1.8em;
            }
            
            .part-number {
                font-size: 1.2em;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }

            .photos-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="content"></div>

    <div id="photoModal" class="modal">
        <span class="close">&times;</span>
        <img class="modal-content" id="modalImg">
    </div>

    <script>
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        function decodeData(base64) {
            try {
                const json = decodeURIComponent(escape(atob(base64)));
                return JSON.parse(json);
            } catch (e) {
                console.error('Error al decodificar:', e);
                return null;
            }
        }

        function renderError(message) {
            document.getElementById('content').innerHTML = `
                <div class="error">
                    <h1>❌ Error</h1>
                    <p>${message}</p>
                </div>
            `;
        }

        function renderData(data) {
            console.log('Datos recibidos:', data);

            let html = '';

            // Header
            html += '<div class="card">';
            html += '<div class="header">';
            html += `<div class="shipment-title">📦 EMBARQUE ${data.shipment}</div>`;
            html += `<div class="part-number">${data.partNumber}</div>`;
            html += '</div>';

            // Info grid
            html += '<div class="info-grid">';
            
            if (data.lotPar) {
                html += `
                    <div class="info-item">
                        <div class="info-label">Lot/Par</div>
                        <div class="info-value">${data.lotPar}</div>
                    </div>
                `;
            }
            
            if (data.qty) {
                html += `
                    <div class="info-item">
                        <div class="info-label">Cantidad</div>
                        <div class="info-value">${data.qty}</div>
                    </div>
                `;
            }
            
            if (data.deliveryMx) {
                html += `
                    <div class="info-item">
                        <div class="info-label">Delivery MX</div>
                        <div class="info-value">${data.deliveryMx}</div>
                    </div>
                `;
            }
            
            if (data.deliveryCanFra && data.deliveryCanFra !== 'N/A') {
                html += `
                    <div class="info-item">
                        <div class="info-label">Delivery CAN/FRA</div>
                        <div class="info-value">${data.deliveryCanFra}</div>
                    </div>
                `;
            }
            
            if (data.po) {
                html += `
                    <div class="info-item">
                        <div class="info-label">PO</div>
                        <div class="info-value">${data.po}</div>
                    </div>
                `;
            }

            html += '</div>';

            // Fotos
            if (data.fotoBL || data.fotoEmbarque) {
                html += '<div class="photos-section">';
                html += '<div class="photos-title">📷 Fotografías</div>';
                html += '<div class="photos-grid">';

                if (data.fotoBL) {
                    html += `
                        <div class="photo-card">
                            <div class="photo-label">📄 Foto BL</div>
                            <img src="${data.fotoBL}" 
                                 alt="Foto BL" 
                                 class="photo-img" 
                                 onclick="openModal(this.src)"
                                 onerror="this.parentElement.innerHTML='<div class=photo-placeholder>❌ Imagen no disponible</div>'">
                        </div>
                    `;
                }

                if (data.fotoEmbarque) {
                    html += `
                        <div class="photo-card">
                            <div class="photo-label">🚚 Foto Embarque</div>
                            <img src="${data.fotoEmbarque}" 
                                 alt="Foto Embarque" 
                                 class="photo-img" 
                                 onclick="openModal(this.src)"
                                 onerror="this.parentElement.innerHTML='<div class=photo-placeholder>❌ Imagen no disponible</div>'">
                        </div>
                    `;
                }

                html += '</div></div>';
            }

            html += '</div>';

            document.getElementById('content').innerHTML = html;
        }

        function openModal(src) {
            const modal = document.getElementById('photoModal');
            const modalImg = document.getElementById('modalImg');
            modal.style.display = 'block';
            modalImg.src = src;
        }

        document.addEventListener('DOMContentLoaded', function() {
            const modal = document.getElementById('photoModal');
            const span = document.getElementsByClassName('close')[0];

            span.onclick = function() {
                modal.style.display = 'none';
            }

            modal.onclick = function(event) {
                if (event.target == modal) {
                    modal.style.display = 'none';
                }
            }
        });

        const encodedData = getQueryParam('d');
        if (!encodedData) {
            renderError('No se proporcionaron datos. Por favor, escanea un código QR válido.');
        } else {
            const data = decodeData(encodedData);
            if (!data) {
                renderError('Los datos no se pudieron decodificar. Código QR inválido.');
            } else {
                renderData(data);
            }
        }
    </script>
</body>
</html>
