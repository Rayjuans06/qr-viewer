<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embarque - LAUAK</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #DC143C 0%, #A01020 100%);
            color: white;
            padding: 25px;
            text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 5px; }
        .warning-multi {
            background: #FFF3CD;
            border: 2px solid #FFC107;
            color: #856404;
            padding: 15px;
            margin: 20px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
        }
        .info { padding: 25px; }
        .shipment-info {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            text-align: center;
        }
        .shipment-info h2 {
            color: #DC143C;
            font-size: 32px;
            margin-bottom: 5px;
        }
        .parte-info {
            background: #E3F2FD;
            color: #1976D2;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            font-weight: 600;
        }
        
        /* GALERÍA DE FOTOS */
        .galeria-fotos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px 0;
        }
        
        .foto-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .foto-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
        }
        
        .foto-header {
            background: #DC143C;
            color: white;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
        }
        
        .foto-container {
            position: relative;
            width: 100%;
            padding-top: 75%; /* Ratio 4:3 */
            background: #f0f0f0;
            overflow: hidden;
        }
        
        .foto-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .foto-container img:hover {
            transform: scale(1.05);
        }
        
        .foto-placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #999;
            text-align: center;
            font-size: 48px;
        }
        
        .sin-fotos {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .sin-fotos svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
        }
        
        .error {
            text-align: center;
            padding: 50px;
            color: #DC143C;
        }
        
        @media (max-width: 768px) {
            .galeria-fotos {
                grid-template-columns: 1fr;
            }
            .header h1 { font-size: 22px; }
            .shipment-info h2 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 Embarque LAUAK</h1>
        </div>
        
        <div id="content" class="info">
            <p>Cargando...</p>
        </div>
    </div>

    <script>
        const SHAREPOINT_BASE_BL = 'https://groupelauak-my.sharepoint.com/personal/juan_raymundo_wiprolauak_com/Documents/Aplicaciones/Microsoft%20Forms/Formulario%20sin%20t%C3%ADtulo%201/Pregunta/';
        const EXTENSIONES = ['.jpeg', '.jpg', '.png', '.JPEG', '.JPG', '.PNG'];

        function decodificarDatos() {
            const urlParams = new URLSearchParams(window.location.search);
            const dataParam = urlParams.get('d');
            
            if (!dataParam) {
                throw new Error('No se encontraron datos en el QR');
            }
            
            const json = decodeURIComponent(escape(atob(dataParam)));
            return JSON.parse(json);
        }

        function obtenerURLsFoto(codigo) {
            if (!codigo) return [];
            return EXTENSIONES.map(ext => `${SHAREPOINT_BASE_BL}${codigo}${ext}`);
        }

        function intentarCargarImagen(imgElement, urls, blMexico, index = 0) {
            if (index >= urls.length) {
                console.error(`❌ No se encontró foto para BL ${blMexico}`);
                imgElement.parentElement.innerHTML = `
                    <div class="foto-placeholder">
                        📷
                        <div style="font-size: 14px; margin-top: 10px;">Sin imagen</div>
                    </div>
                `;
                return;
            }

            const url = urls[index];
            
            imgElement.onerror = () => intentarCargarImagen(imgElement, urls, blMexico, index + 1);
            imgElement.onload = () => {
                console.log(`✅ Foto cargada: BL ${blMexico}`);
                imgElement.onclick = () => window.open(url, '_blank');
            };
            imgElement.src = url;
        }

        function mostrarDatos(datos) {
            const content = document.getElementById('content');
            
            console.log('📦 Datos:', datos);
            
            let html = '';
            
            if (datos.pts > 1) {
                html += `
                    <div class="warning-multi">
                        ⚠️ Este embarque tiene ${datos.t} fotos divididas en ${datos.pts} QR
                        <br>Escanea TODOS los QR para ver todas las fotos
                    </div>
                `;
            }
            
            html += `
                <div class="shipment-info">
                    <h2>Embarque ${datos.i}</h2>
            `;
            
            if (datos.pts > 1) {
                html += `
                    <div class="parte-info">
                        📄 Parte ${datos.pt} de ${datos.pts} | 
                        ${datos.c} de ${datos.t} fotos
                    </div>
                `;
            } else {
                html += `
                    <p style="color: #666; margin-top: 5px;">
                        <strong>${datos.c}</strong> ${datos.c === 1 ? 'foto' : 'fotos'}
                    </p>
                `;
            }
            
            html += `</div>`;
            
            // Filtrar registros que tengan foto
            const registrosConFoto = datos.d.filter(reg => reg.f && reg.f !== "");
            
            if (registrosConFoto.length === 0) {
                html += `
                    <div class="sin-fotos">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <polyline points="21 15 16 10 5 21"/>
                        </svg>
                        <h3>No hay fotos disponibles</h3>
                        <p>Este embarque no tiene fotos asociadas</p>
                    </div>
                `;
            } else {
                html += '<div class="galeria-fotos">';
                
                registrosConFoto.forEach((reg, index) => {
                    let numeroGlobal = datos.pts > 1 ? 
                        ((datos.pt - 1) * 10) + (datos.d.indexOf(reg) + 1) : 
                        datos.d.indexOf(reg) + 1;
                    
                    html += `
                        <div class="foto-card">
                            <div class="foto-header">
                                BL Mexico: ${reg.bl || 'N/A'}
                            </div>
                            <div class="foto-container">
                                <img id="foto_${index}" alt="Foto BL ${reg.bl}">
                            </div>
                        </div>
                    `;
                });
                
                html += '</div>';
            }
            
            content.innerHTML = html;

            // Cargar fotos
            registrosConFoto.forEach((reg, index) => {
                const img = document.getElementById(`foto_${index}`);
                if (img && reg.f) {
                    const urls = obtenerURLsFoto(reg.f);
                    intentarCargarImagen(img, urls, reg.bl);
                }
            });
        }

        try {
            const datos = decodificarDatos();
            console.log('✅ Datos decodificados');
            mostrarDatos(datos);
        } catch (error) {
            console.error('❌ Error:', error);
            document.getElementById('content').innerHTML = `
                <div class="error">
                    <h2>❌ Error</h2>
                    <p>${error.message}</p>
                    <p style="margin-top: 10px; color: #666;">
                        Por favor, escanea un código QR válido.
                    </p>
                </div>
            `;
        }
    </script>
</body>
</html>
