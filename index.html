<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Información de Embarque</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            max-width: 500px;
            width: 100%;
            padding: 32px;
            animation: slideIn 0.4s ease-out;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .header {
            text-align: center;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }
        .title-badge {
            display: inline-block;
            background: #f0f0f0;
            color: #d32f2f;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .nombre {
            font-size: 22px;
            font-weight: 500;
            color: #212121;
            margin: 0;
        }
        .info-group {
            margin-bottom: 18px;
            padding: 0;
        }
        .label {
            font-weight: 600;
            color: #d32f2f;
            font-size: 11px;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .value {
            color: #424242;
            font-size: 15px;
            word-break: break-word;
            line-height: 1.5;
            padding-left: 8px;
        }
        .divider {
            height: 1px;
            background: #f0f0f0;
            margin: 16px 0;
        }
        .fotos-section {
            margin: 24px 0;
        }
        .foto-container {
            margin-bottom: 20px;
            padding: 16px;
            background: #fafafa;
            border-radius: 6px;
            border-left: 4px solid #d32f2f;
        }
        .foto-title {
            font-weight: 600;
            color: #d32f2f;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 0.3px;
        }
        .foto-link {
            display: inline-block;
            padding: 8px 16px;
            background: #d32f2f;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
            margin-bottom: 8px;
        }
        .foto-link:hover {
            background: #b71c1c;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(211, 47, 47, 0.2);
        }
        .foto-preview {
            margin-top: 10px;
            max-width: 100%;
            max-height: 280px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: none;
        }
        .foto-preview.show {
            display: block;
        }
        .footer {
            text-align: center;
            margin-top: 28px;
            padding-top: 16px;
            border-top: 1px solid #e0e0e0;
            color: #9e9e9e;
            font-size: 12px;
        }
        .bl-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        .bl-box {
            padding: 12px;
            background: #fff3e0;
            border-radius: 4px;
            border-left: 3px solid #d32f2f;
        }
        .bl-label {
            font-weight: 600;
            color: #d32f2f;
            font-size: 10px;
            text-transform: uppercase;
            margin-bottom: 4px;
            letter-spacing: 0.2px;
        }
        .bl-value {
            color: #424242;
            font-size: 14px;
            font-weight: 500;
            word-break: break-word;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title-badge">📦 Información de Embarque</div>
            <h1 class="nombre" id="nombrePreparador">--</h1>
        </div>

        <div class="info-group">
            <div class="label">📍 Dirección del Cliente</div>
            <div class="value" id="direccionCliente">--</div>
        </div>

        <div class="divider"></div>

        <div class="bl-info">
            <div class="bl-box">
                <div class="bl-label">🇲🇽 BL México</div>
                <div class="bl-value" id="blMexico">--</div>
            </div>
            <div class="bl-box">
                <div class="bl-label">🇨🇦 BL Canadá</div>
                <div class="bl-value" id="blCanada">--</div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="fotos-section">
            <div class="foto-container">
                <div class="foto-title">📄 Foto BL</div>
                <a href="#" id="fotoBLLink" class="foto-link" target="_blank" style="display: none;">
                    Ver Imagen
                </a>
                <img id="fotoBLPreview" class="foto-preview" />
            </div>

            <div class="foto-container">
                <div class="foto-title">📸 Foto de Embarque</div>
                <a href="#" id="fotoEmbarqueLink" class="foto-link" target="_blank" style="display: none;">
                    Ver Imagen
                </a>
                <img id="fotoEmbarquePreview" class="foto-preview" />
            </div>
        </div>

        <div class="footer">
            <p>Información registrada en el sistema</p>
            <p id="timestamp"></p>
        </div>
    </div>

    <script>
        // Obtener parámetros de la URL
        const params = new URLSearchParams(window.location.search);
        const datosStr = params.get('data');
        
        if (datosStr) {
            try {
                const datos = JSON.parse(decodeURIComponent(datosStr));
                
                // Llenar los campos principales
                document.getElementById('nombrePreparador').textContent = datos.nombrePreparador || '--';
                document.getElementById('direccionCliente').textContent = datos.direccionCliente || '--';
                document.getElementById('blMexico').textContent = datos.blMexico || '--';
                document.getElementById('blCanada').textContent = datos.blCanada || '--';
                
                // Manejar Foto BL
                if (datos.fotoBL && datos.fotoBL.trim() !== '') {
                    const fotoBLLink = document.getElementById('fotoBLLink');
                    fotoBLLink.href = datos.fotoBL;
                    fotoBLLink.style.display = 'inline-block';
                    
                    const fotoBLPreview = document.getElementById('fotoBLPreview');
                    fotoBLPreview.src = datos.fotoBL;
                    fotoBLPreview.classList.add('show');
                    fotoBLPreview.onerror = function() {
                        fotoBLPreview.classList.remove('show');
                    };
                }
                
                // Manejar Foto de Embarque
                if (datos.fotoEmbarque && datos.fotoEmbarque.trim() !== '') {
                    const fotoEmbarqueLink = document.getElementById('fotoEmbarqueLink');
                    fotoEmbarqueLink.href = datos.fotoEmbarque;
                    fotoEmbarqueLink.style.display = 'inline-block';
                    
                    const fotoEmbarquePreview = document.getElementById('fotoEmbarquePreview');
                    fotoEmbarquePreview.src = datos.fotoEmbarque;
                    fotoEmbarquePreview.classList.add('show');
                    fotoEmbarquePreview.onerror = function() {
                        fotoEmbarquePreview.classList.remove('show');
                    };
                }
                
            } catch(e) {
                document.querySelector('.container').innerHTML = '<p style="color:#d32f2f; text-align:center;">Error al cargar los datos: ' + e.message + '</p>';
            }
        }
        
        // Mostrar timestamp
        const now = new Date().toLocaleString('es-ES');
        document.getElementById('timestamp').textContent = `Consultado: ${now}`;
    </script>
</body>
</html>
