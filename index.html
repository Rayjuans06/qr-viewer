<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Embarque - LAUAK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #DC143C 0%, #A01020 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .info {
            padding: 30px;
        }
        
        .shipment-info {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        
        .shipment-info h2 {
            color: #DC143C;
            margin-bottom: 10px;
        }
        
        .registro {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .registro h3 {
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #DC143C;
        }
        
        .campo {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 10px;
            margin-bottom: 10px;
            padding: 8px;
        }
        
        .campo:nth-child(even) {
            background: #f9f9f9;
        }
        
        .campo-label {
            font-weight: 600;
            color: #666;
        }
        
        .campo-valor {
            color: #333;
        }
        
        .fotos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .foto {
            text-align: center;
        }
        
        .foto img {
            max-width: 100%;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            cursor: pointer;
        }
        
        .foto p {
            margin-top: 10px;
            font-weight: 600;
            color: #666;
        }
        
        .error {
            text-align: center;
            padding: 50px;
            color: #DC143C;
        }
        
        @media (max-width: 768px) {
            .campo {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 Visor de Embarque</h1>
            <p>Sistema LAUAK SARL</p>
        </div>
        
        <div id="content" class="info">
            <p>Cargando...</p>
        </div>
    </div>

    <script>
        // Diccionario de campos comprimidos
        const CAMPOS = {
            p: 'PART NUMBER',
            l: 'LOT PAR',
            q: 'QTY',
            m: 'DELIVERY MX',
            c: 'DELIVERY CAN/FRA',
            o: 'PO',
            u: 'USER',
            k: 'CUSTOMER',
            e: 'CLAVE EMBALAJE',
            w: 'PESO',
            s: 'SERVICE',
            b: 'Foto BL',
            f: 'Foto Embarque'
        };

        // Base URL de SharePoint (común para todas las fotos)
        const SHAREPOINT_BASE = 'https://groupelauak-my.sharepoint.com/personal/juan_raymundo_wiprolauak_com/Documents/Aplicaciones/Microsoft%20Forms/%F0%9F%93%A6%20Registro%20de%20Embarques/Pregunta/';
        const SHAREPOINT_BASE_2 = 'https://groupelauak-my.sharepoint.com/personal/juan_raymundo_wiprolauak_com/Documents/Aplicaciones/Microsoft%20Forms/%F0%9F%93%A6%20Registro%20de%20Embarques/Pregunta%201/';

        function decodificarDatos() {
            const urlParams = new URLSearchParams(window.location.search);
            const dataParam = urlParams.get('d');
            
            if (!dataParam) {
                // Fallback para formato antiguo
                const dataOld = urlParams.get('data');
                if (dataOld) {
                    return JSON.parse(decodeURIComponent(dataOld));
                }
                throw new Error('No se encontraron datos');
            }
            
            // Decodificar Base64
            const json = decodeURIComponent(escape(atob(dataParam)));
            return JSON.parse(json);
        }

        function reconstruirURLFoto(codigo, tipo) {
            if (!codigo) return null;
            const base = tipo === 'b' ? SHAREPOINT_BASE : SHAREPOINT_BASE_2;
            return `${base}${codigo}_Juan%20RAYMUNDO.jpg`;
        }

        function mostrarDatos(datos) {
            const content = document.getElementById('content');
            
            let html = `
                <div class="shipment-info">
                    <h2>Embarque #${datos.i}</h2>
                    <p><strong>Total de registros:</strong> ${datos.c}</p>
                </div>
            `;
            
            datos.d.forEach((registro, index) => {
                html += `
                    <div class="registro">
                        <h3>Registro ${index + 1}</h3>
                `;
                
                // Mostrar campos
                for (let [key, valor] of Object.entries(registro)) {
                    if (key === 'b' || key === 'f') continue; // Fotos se muestran aparte
                    
                    const label = CAMPOS[key] || key;
                    html += `
                        <div class="campo">
                            <div class="campo-label">${label}:</div>
                            <div class="campo-valor">${valor || 'N/A'}</div>
                        </div>
                    `;
                }
                
                // Fotos
                const fotoBL = reconstruirURLFoto(registro.b, 'b');
                const fotoEmbarque = reconstruirURLFoto(registro.f, 'f');
                
                if (fotoBL || fotoEmbarque) {
                    html += '<div class="fotos">';
                    
                    if (fotoBL) {
                        html += `
                            <div class="foto">
                                <img src="${fotoBL}" alt="Foto BL" onclick="window.open('${fotoBL}', '_blank')">
                                <p>📄 Foto BL</p>
                            </div>
                        `;
                    }
                    
                    if (fotoEmbarque) {
                        html += `
                            <div class="foto">
                                <img src="${fotoEmbarque}" alt="Foto Embarque" onclick="window.open('${fotoEmbarque}', '_blank')">
                                <p>📦 Foto Embarque</p>
                            </div>
                        `;
                    }
                    
                    html += '</div>';
                }
                
                html += '</div>';
            });
            
            content.innerHTML = html;
        }

        // Cargar datos al iniciar
        try {
            const datos = decodificarDatos();
            mostrarDatos(datos);
        } catch (error) {
            document.getElementById('content').innerHTML = `
                <div class="error">
                    <h2>❌ Error</h2>
                    <p>${error.message}</p>
                    <p>Por favor, escanea un código QR válido.</p>
                </div>
            `;
        }
    </script>
</body>
</html>
