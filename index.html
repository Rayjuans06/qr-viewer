<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embarque - LAUAK</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #DC143C 0%, #A01020 100%);
            color: white;
            padding: 25px;
            text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 5px; }
        .warning-multi {
            background: #FFF3CD;
            border: 2px solid #FFC107;
            color: #856404;
            padding: 15px;
            margin: 20px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
        }
        .info { padding: 25px; }
        .shipment-info {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            text-align: center;
        }
        .shipment-info h2 {
            color: #DC143C;
            font-size: 32px;
            margin-bottom: 5px;
        }
        .parte-info {
            background: #E3F2FD;
            color: #1976D2;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            font-weight: 600;
        }
        .registro {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .registro-header {
            background: #DC143C;
            color: white;
            padding: 10px;
            margin: -15px -15px 15px -15px;
            font-weight: bold;
            text-align: center;
            border-radius: 6px 6px 0 0;
        }
        .campo {
            display: grid;
            grid-template-columns: 150px 1fr;
            gap: 10px;
            padding: 10px;
            margin-bottom: 5px;
        }
        .campo:nth-child(odd) { background: #f9f9f9; }
        .campo-label { font-weight: 600; color: #666; }
        .campo-valor { color: #333; font-weight: 500; }
        .fotos-embarque {
            margin-top: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
        }
        .fotos-embarque h3 {
            text-align: center;
            color: #DC143C;
            margin-bottom: 20px;
        }
        .fotos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .foto { text-align: center; }
        .foto img {
            max-width: 100%;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .foto img:hover { transform: scale(1.05); }
        .foto p {
            margin-top: 10px;
            font-weight: 600;
            color: #666;
            font-size: 14px;
        }
        .error {
            text-align: center;
            padding: 50px;
            color: #DC143C;
        }
        @media (max-width: 768px) {
            .campo { grid-template-columns: 1fr; }
            .header h1 { font-size: 22px; }
            .shipment-info h2 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 Embarque LAUAK</h1>
        </div>
        
        <div id="content" class="info">
            <p>Cargando...</p>
        </div>
    </div>

    <script>
        // URL base solo para Foto Embarque (Foto BL viene completa)
        const SHAREPOINT_BASE_EMBARQUE = 'https://groupelauak-my.sharepoint.com/personal/juan_raymundo_wiprolauak_com/Documents/Aplicaciones/Microsoft%20Forms/Formulario%20sin%20t%C3%ADtulo%201/Foto%20BL/';

        const EXTENSIONES = ['.jpeg', '.jpg', '.png', '.JPEG', '.JPG', '.PNG'];

        function decodificarDatos() {
            const urlParams = new URLSearchParams(window.location.search);
            const dataParam = urlParams.get('d');
            
            if (!dataParam) {
                throw new Error('No se encontraron datos en el QR');
            }
            
            const json = decodeURIComponent(escape(atob(dataParam)));
            return JSON.parse(json);
        }

        function obtenerURLsFoto(dato, tipo) {
            // Si 'dato' es una URL completa, usarla directamente
            if (dato && dato.startsWith('http')) {
                console.log(`✅ ${tipo}: URL completa recibida`);
                return [dato];
            }
            
            // Si es un código, reconstruir URL
            if (dato && tipo === 'Embarque') {
                return EXTENSIONES.map(ext => `${SHAREPOINT_BASE_EMBARQUE}${dato}${ext}`);
            }
            
            return [];
        }

        function intentarCargarImagen(imgElement, urls, index = 0) {
            if (index >= urls.length) {
                const tipo = imgElement.dataset.tipo;
                console.error(`❌ Todas las URLs fallaron para foto ${tipo}`);
                imgElement.parentElement.innerHTML = `
                    <p style="color:#dc3545; padding: 20px;">❌ Error al cargar foto ${tipo}</p>
                    <small style="word-break: break-all; color: #666; display: block; margin-top: 10px;">
                        Intentadas: ${urls.length} URLs diferentes
                    </small>
                `;
                return;
            }

            const url = urls[index];
            console.log(`🔄 Intentando cargar ${imgElement.dataset.tipo} (${index + 1}/${urls.length}):`, url);
            
            imgElement.onerror = () => intentarCargarImagen(imgElement, urls, index + 1);
            imgElement.onload = () => console.log(`✅ Foto ${imgElement.dataset.tipo} cargada exitosamente`);
            imgElement.src = url;
        }

        function mostrarDatos(datos) {
            const content = document.getElementById('content');
            
            console.log('📦 Datos completos:', datos);
            console.log('📸 Foto BL:', datos.b);
            console.log('📸 Foto Embarque:', datos.f);
            
            let html = '';
            
            if (datos.pts > 1) {
                html += `
                    <div class="warning-multi">
                        ⚠️ Este embarque tiene ${datos.t} registros divididos en ${datos.pts} QR
                        <br>Escanea TODOS los QR para ver la información completa
                    </div>
                `;
            }
            
            html += `
                <div class="shipment-info">
                    <h2>Embarque ${datos.i}</h2>
            `;
            
            if (datos.pts > 1) {
                html += `
                    <div class="parte-info">
                        📄 Parte ${datos.pt} de ${datos.pts} | 
                        ${datos.c} de ${datos.t} registros
                    </div>
                `;
            } else {
                html += `
                    <p style="color: #666; margin-top: 5px;">
                        <strong>${datos.c}</strong> ${datos.c === 1 ? 'registro' : 'registros'}
                    </p>
                `;
            }
            
            html += `</div>`;
            
            datos.d.forEach((reg, index) => {
                let numeroGlobal = datos.pts > 1 ? 
                    ((datos.pt - 1) * 10) + index + 1 : 
                    index + 1;
                    
                html += `
                    <div class="registro">
                        <div class="registro-header">Registro ${numeroGlobal}${datos.pts > 1 ? ` (de ${datos.t} totales)` : ''}</div>
                        <div class="campo">
                            <div class="campo-label">PART NUMBER:</div>
                            <div class="campo-valor">${reg.p || 'N/A'}</div>
                        </div>
                        <div class="campo">
                            <div class="campo-label">LOT PAR:</div>
                            <div class="campo-valor">${reg.l || 'N/A'}</div>
                        </div>
                        <div class="campo">
                            <div class="campo-label">QTY:</div>
                            <div class="campo-valor">${reg.q || 'N/A'}</div>
                        </div>
                        <div class="campo">
                            <div class="campo-label">DELIVERY MX:</div>
                            <div class="campo-valor">${reg.m || 'N/A'}</div>
                        </div>
                        <div class="campo">
                            <div class="campo-label">DELIVERY CAN/FRA:</div>
                            <div class="campo-valor">${reg.c || 'N/A'}</div>
                        </div>
                        <div class="campo">
                            <div class="campo-label">PO:</div>
                            <div class="campo-valor">${reg.o || 'N/A'}</div>
                        </div>
                    </div>
                `;
            });
            
            if (datos.b || datos.f) {
                html += '<div class="fotos-embarque">';
                html += '<h3>📸 Fotos del Embarque</h3>';
                html += '<div class="fotos-grid">';
                
                if (datos.b) {
                    html += `
                        <div class="foto">
                            <img id="fotoBL" 
                                 alt="Foto BL" 
                                 data-tipo="BL"
                                 style="cursor: pointer;">
                            <p>📄 Bill of Lading</p>
                        </div>
                    `;
                }
                
                if (datos.f) {
                    html += `
                        <div class="foto">
                            <img id="fotoEmbarque" 
                                 alt="Foto Embarque"
                                 data-tipo="Embarque"
                                 style="cursor: pointer;">
                            <p>📦 Foto Embarque</p>
                        </div>
                    `;
                }
                
                html += '</div></div>';
            }
            
            content.innerHTML = html;

            // Cargar fotos
            if (datos.b) {
                const imgBL = document.getElementById('fotoBL');
                const urlsBL = obtenerURLsFoto(datos.b, 'BL');
                imgBL.onclick = () => window.open(imgBL.src, '_blank');
                intentarCargarImagen(imgBL, urlsBL);
            }
            
            if (datos.f) {
                const imgEmb = document.getElementById('fotoEmbarque');
                const urlsEmb = obtenerURLsFoto(datos.f, 'Embarque');
                imgEmb.onclick = () => window.open(imgEmb.src, '_blank');
                intentarCargarImagen(imgEmb, urlsEmb);
            }
        }

        try {
            const datos = decodificarDatos();
            console.log('✅ Datos decodificados correctamente');
            mostrarDatos(datos);
        } catch (error) {
            console.error('❌ Error:', error);
            document.getElementById('content').innerHTML = `
                <div class="error">
                    <h2>❌ Error</h2>
                    <p>${error.message}</p>
                    <p style="margin-top: 10px; color: #666;">
                        Por favor, escanea un código QR válido.
                    </p>
                </div>
            `;
        }
    </script>
</body>
</html>
