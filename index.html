<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Embarque</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .shipment-title {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 10px;
            text-align: center;
            font-weight: bold;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .info-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .info-label {
            font-size: 0.85em;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1.1em;
            color: #333;
            font-weight: bold;
        }

        .warning {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            color: #856404;
        }

        .photos-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .photos-title {
            font-size: 1.5em;
            color: #667eea;
            margin-bottom: 20px;
            text-align: center;
        }

        .photos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .photo-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }

        .photo-label {
            font-size: 1.1em;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .photo-img {
            width: 100%;
            max-width: 400px;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.3s;
        }

        .photo-img:hover {
            transform: scale(1.05);
        }

        .photo-placeholder {
            color: #999;
            font-style: italic;
            padding: 20px;
        }

        .table-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }

        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 10px;
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            padding: 12px 10px;
            border-bottom: 1px solid #e0e0e0;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .error {
            background: white;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            color: #dc3545;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* Modal para ver fotos en grande */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
        }

        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 90%;
            margin-top: 2%;
        }

        .close {
            position: absolute;
            top: 30px;
            right: 45px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .shipment-title {
                font-size: 1.8em;
            }
            
            .info-grid {
                grid-template-columns: 1fr;
            }

            .photos-grid {
                grid-template-columns: 1fr;
            }
            
            table {
                font-size: 0.75em;
            }
            
            th, td {
                padding: 8px 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="content"></div>

    <!-- Modal para ver fotos -->
    <div id="photoModal" class="modal">
        <span class="close">&times;</span>
        <img class="modal-content" id="modalImg">
    </div>

    <script>
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        function decodeData(base64) {
            try {
                const json = decodeURIComponent(escape(atob(base64)));
                return JSON.parse(json);
            } catch (e) {
                console.error('Error al decodificar:', e);
                return null;
            }
        }

        function renderError(message) {
            document.getElementById('content').innerHTML = `
                <div class="error">
                    <h1>❌ Error</h1>
                    <p>${message}</p>
                </div>
            `;
        }

        function getPhotoUrl(filename) {
            if (!filename) return null;
            // Construir URL completa de la foto
            return `https://forms.office.com/FormSvr.aspx?id=bM-I8s2W3EmvjU4mvk_hNfAlBh9yKM9JvhMw76aZ_n9UNUwzWFVBWEpPQ1JQMUNXOVBHM1EzNTMxUiQlQCN0PWcu&target=${filename}_Juan%20RAYMUNDO.jpg`;
        }

        function renderPhotos(data) {
            let html = '';

            if (data.b || data.f) {
                html += '<div class="photos-section">';
                html += '<div class="photos-title">📷 Fotografías del Embarque</div>';
                html += '<div class="photos-grid">';

                // Foto BL
                if (data.b) {
                    const urlBL = getPhotoUrl(data.b);
                    html += `
                        <div class="photo-card">
                            <div class="photo-label">📄 Foto BL</div>
                            <img src="${urlBL}" 
                                 alt="Foto BL" 
                                 class="photo-img" 
                                 onclick="openModal(this.src)"
                                 onerror="this.parentElement.innerHTML='<div class=photo-placeholder>❌ Imagen no disponible</div>'">
                        </div>
                    `;
                } else {
                    html += `
                        <div class="photo-card">
                            <div class="photo-label">📄 Foto BL</div>
                            <div class="photo-placeholder">No disponible</div>
                        </div>
                    `;
                }

                // Foto Embarque
                if (data.f) {
                    const urlEmb = getPhotoUrl(data.f);
                    html += `
                        <div class="photo-card">
                            <div class="photo-label">🚚 Foto Embarque</div>
                            <img src="${urlEmb}" 
                                 alt="Foto Embarque" 
                                 class="photo-img" 
                                 onclick="openModal(this.src)"
                                 onerror="this.parentElement.innerHTML='<div class=photo-placeholder>❌ Imagen no disponible</div>'">
                        </div>
                    `;
                } else {
                    html += `
                        <div class="photo-card">
                            <div class="photo-label">🚚 Foto Embarque</div>
                            <div class="photo-placeholder">No disponible</div>
                        </div>
                    `;
                }

                html += '</div></div>';
            }

            return html;
        }

        function renderData(data) {
            let html = '';

            // Header con SHIPMENT NUMBER completo
            html += '<div class="header">';
            html += `<div class="shipment-title">📦 EMBARQUE #${data.i}</div>`;
            
            // Info grid
            html += '<div class="info-grid">';
            html += `
                <div class="info-item">
                    <div class="info-label">Registros en esta parte</div>
                    <div class="info-value">${data.c}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Total de registros</div>
                    <div class="info-value">${data.t}</div>
                </div>
            `;

            // Mostrar advertencia si hay múltiples partes
            if (data.pts > 1) {
                html += `
                    <div class="info-item" style="grid-column: 1 / -1;">
                        <div class="info-label">⚠️ Parte del embarque</div>
                        <div class="info-value">${data.pt} de ${data.pts}</div>
                    </div>
                `;
            }

            html += '</div></div>';

            // Advertencia si es parte múltiple
            if (data.pts > 1) {
                html += `
                    <div class="warning">
                        ⚠️ <strong>ATENCIÓN:</strong> Este QR muestra la parte ${data.pt} de ${data.pts}. 
                        Escanea todos los QR para ver el embarque completo.
                    </div>
                `;
            }

            // Fotos
            html += renderPhotos(data);

            // Tabla de productos
            html += '<div class="table-container">';
            html += '<table>';
            html += `
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Part Number</th>
                        <th>Lot/Par</th>
                        <th>Qty</th>
                        <th>Delivery MX</th>
                        <th>Delivery CAN/FRA</th>
                        <th>PO</th>
                    </tr>
                </thead>
                <tbody>
            `;

            data.d.forEach((item, index) => {
                html += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${item.p || '-'}</td>
                        <td>${item.l || '-'}</td>
                        <td>${item.q || '-'}</td>
                        <td>${item.m || '-'}</td>
                        <td>${item.c || '-'}</td>
                        <td>${item.o || '-'}</td>
                    </tr>
                `;
            });

            html += '</tbody></table></div>';

            document.getElementById('content').innerHTML = html;
        }

        // Modal de fotos
        function openModal(src) {
            const modal = document.getElementById('photoModal');
            const modalImg = document.getElementById('modalImg');
            modal.style.display = 'block';
            modalImg.src = src;
        }

        // Cerrar modal
        document.addEventListener('DOMContentLoaded', function() {
            const modal = document.getElementById('photoModal');
            const span = document.getElementsByClassName('close')[0];

            span.onclick = function() {
                modal.style.display = 'none';
            }

            modal.onclick = function(event) {
                if (event.target == modal) {
                    modal.style.display = 'none';
                }
            }
        });

        // Cargar datos
        const encodedData = getQueryParam('d');
        if (!encodedData) {
            renderError('No se proporcionaron datos. Por favor, escanea un código QR válido.');
        } else {
            const data = decodeData(encodedData);
            if (!data) {
                renderError('Los datos no se pudieron decodificar. Código QR inválido.');
            } else {
                renderData(data);
            }
        }
    </script>
</body>
</html>
