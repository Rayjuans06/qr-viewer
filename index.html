<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Información del Registro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            max-width: 450px;
            width: 100%;
            padding: 32px;
            animation: slideIn 0.4s ease-out;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .header {
            text-align: center;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }
        .id-badge {
            display: inline-block;
            background: #f0f0f0;
            color: #d32f2f;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .nombre {
            font-size: 22px;
            font-weight: 500;
            color: #212121;
            margin: 0;
        }
        .info-group {
            margin-bottom: 18px;
            padding: 0;
        }
        .label {
            font-weight: 600;
            color: #d32f2f;
            font-size: 11px;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .value {
            color: #424242;
            font-size: 15px;
            word-break: break-word;
            line-height: 1.5;
        }
        .foto-container {
            margin: 24px 0;
            text-align: center;
        }
        .foto-link {
            display: inline-block;
            padding: 10px 20px;
            background: #d32f2f;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
        }
        .foto-link:hover {
            background: #b71c1c;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(211, 47, 47, 0.2);
        }
        .foto-preview {
            margin-top: 12px;
            max-width: 100%;
            max-height: 300px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .footer {
            text-align: center;
            margin-top: 28px;
            padding-top: 16px;
            border-top: 1px solid #e0e0e0;
            color: #9e9e9e;
            font-size: 12px;
        }
        .divider {
            height: 1px;
            background: #f0f0f0;
            margin: 16px 0;
        }
        .icon {
            width: 16px;
            height: 16px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="id-badge" id="id">ID: --</div>
            <h1 class="nombre" id="nombre">--</h1>
        </div>

        <div class="info-group">
            <div class="label">📧 Correo Electrónico</div>
            <div class="value" id="correoForm">--</div>
        </div>

        <div class="info-group">
            <div class="label">📱 Teléfono</div>
            <div class="value" id="telefono">--</div>
        </div>

        <div class="divider"></div>

        <div class="info-group">
            <div class="label">⏰ Hora de Inicio</div>
            <div class="value" id="horaInicio">--</div>
        </div>

        <div class="info-group">
            <div class="label">⏹️ Hora de Finalización</div>
            <div class="value" id="horaFin">--</div>
        </div>

        <div class="divider"></div>

        <div class="info-group">
            <div class="label">📝 Descripción</div>
            <div class="value" id="descripcion">--</div>
        </div>

        <div class="foto-container">
            <a href="#" id="fotoLink" class="foto-link" target="_blank" style="display: none;">
                📸 Ver Foto
            </a>
            <img id="fotoPreview" class="foto-preview" style="display: none;" />
        </div>

        <div class="footer">
            <p>Información registrada en el sistema</p>
            <p id="timestamp"></p>
        </div>
    </div>

    <script>
        // Obtener parámetros de la URL
        const params = new URLSearchParams(window.location.search);
        const datosStr = params.get('data');
        
        if (datosStr) {
            try {
                const datos = JSON.parse(decodeURIComponent(datosStr));
                
                // Llenar los campos
                document.getElementById('id').textContent = `ID: ${datos.id}`;
                document.getElementById('nombre').textContent = datos.nombreCompleto || datos.nombre;
                document.getElementById('correoForm').textContent = datos.correoForm || '--';
                document.getElementById('telefono').textContent = datos.telefono || '--';
                document.getElementById('horaInicio').textContent = datos.horaInicio || '--';
                document.getElementById('horaFin').textContent = datos.horaFin || '--';
                document.getElementById('descripcion').textContent = datos.descripcion || '--';
                
                // Manejar la foto
                if (datos.foto && datos.foto.trim() !== '') {
                    document.getElementById('fotoLink').href = datos.foto;
                    document.getElementById('fotoLink').style.display = 'inline-block';
                    
                    // Intentar cargar la foto como preview
                    const fotoPreview = document.getElementById('fotoPreview');
                    fotoPreview.src = datos.foto;
                    fotoPreview.style.display = 'block';
                    fotoPreview.onerror = function() {
                        fotoPreview.style.display = 'none';
                    };
                }
                
            } catch(e) {
                document.querySelector('.container').innerHTML = '<p style="color:#d32f2f; text-align:center;">Error al cargar los datos: ' + e.message + '</p>';
            }
        }
        
        // Mostrar timestamp
        const now = new Date().toLocaleString('es-ES');
        document.getElementById('timestamp').textContent = `Consultado: ${now}`;
    </script>
</body>
</html>
